name: Telegram On-Demand Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Direct Firmware URL to check'
        required: true
        type: string
      request_chat_id:
        description: 'Telegram Chat ID for reply'
        required: true
        type: string
      request_message_id:
        description: 'Telegram Message ID to reply to'
        required: false
        type: string
      request_user_name:
        description: 'User name to mention'
        required: false
        type: string
      request_status_message_id:
        description: 'Bot status message ID to delete'
        required: false
        type: string

jobs:
  check-firmware:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.BOTTOKEN }}
      STATUS_CHAT_ID: ${{ github.event.inputs.request_chat_id }}
      STATUS_MSG_ID: ${{ github.event.inputs.request_status_message_id }}
    steps:
      - name: Parse Chat ID
        id: parse_chat
        run: |
          FULL_CHAT_ID="${{ github.event.inputs.request_chat_id }}"
          # Extract raw chat_id (before underscore, if present)
          RAW_CHAT_ID=$(echo "$FULL_CHAT_ID" | cut -d'_' -f1)
          echo "raw_chat_id=$RAW_CHAT_ID" >> $GITHUB_OUTPUT

      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Cache APT Packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: aria2 unzip curl p7zip
          version: 1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache Tools
        id: cache-tools
        uses: actions/cache@v5
        with:
          path: tools/
          key: tools-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            tools-v1-${{ runner.os }}-

      - name: Setup Tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p tools
          
          # Setup arbextract
          curl -L -o tools/arbextract https://github.com/koaaN/arbextract/releases/download/1.0/arbextract-x86_64-linux
          chmod +x tools/arbextract
          
          # Setup otaripper
          curl -L -o otaripper.tar.gz https://github.com/syedinsaf/otaripper/releases/download/v2.1.1/otaripper-2.1.1-linux-static-x86_64.tar.gz
          tar -xzvf otaripper.tar.gz
          mv otaripper tools/otaripper || find . -name "otaripper" -type f -exec mv {} tools/otaripper \;
          chmod +x tools/otaripper
          
          # Setup payload-dumper-go (Fallback)
          curl -L -o pdg.tar.gz https://github.com/ssut/payload-dumper-go/releases/download/1.2.2/payload-dumper-go_1.2.2_linux_amd64.tar.gz
          tar -xzvf pdg.tar.gz
          mv payload-dumper-go tools/payload-dumper-go || find . -name "payload-dumper-go" -type f -exec mv {} tools/payload-dumper-go \;
          chmod +x tools/payload-dumper-go

      - name: Ensure Tools are Executable
        run: chmod +x tools/* || true

      - name: Update Status - Downloading
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${{ steps.parse_chat.outputs.raw_chat_id }}" \
            -d "message_id=${STATUS_MSG_ID}" \
            -d "text=⏳ Downloading firmware..." || true

      - name: Download Firmware
        id: download
        continue-on-error: true
        run: |
          URL="${{ github.event.inputs.firmware_url }}"
          echo "Downloading firmware from $URL..."
          
          if [[ "$URL" == *.img ]]; then
            ARIA_CMD="aria2c -c -x16 -s16 -k1M -o firmware_data/xbl_config.img"
            mkdir -p firmware_data
          elif [[ "$URL" == *.7z ]]; then
            ARIA_CMD="aria2c -c -x16 -s16 -k1M -o firmware.7z"
          else
            ARIA_CMD="aria2c -c -x16 -s16 -k1M -o firmware.zip"
          fi
          
          if $ARIA_CMD "$URL"; then
             echo "Download successful!"
          else
             echo "Download failed!"
             exit 1
          fi

      - name: Update Status - Analyzing
        if: steps.download.outcome == 'success'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${{ steps.parse_chat.outputs.raw_chat_id }}" \
            -d "message_id=${STATUS_MSG_ID}" \
            -d "text=🔬 Analyzing firmware..." || true

      - name: Analyze Firmware
        id: analyze
        continue-on-error: true
        run: |
          if [ -f firmware_data/xbl_config.img ]; then
            FW_FILE="firmware_data/xbl_config.img"
          elif [ -f firmware.7z ]; then
            FW_FILE="firmware.7z"
          else
            FW_FILE="firmware.zip"
          fi
          
          python3 analyze_firmware.py "$FW_FILE" \
            --tools-dir tools \
            --output-dir extracted \
            --final-dir firmware_data \
            --json > result.json
          
          cat result.json

      - name: Update Status - Preparing Results
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
            -d "chat_id=${{ steps.parse_chat.outputs.raw_chat_id }}" \
            -d "message_id=${STATUS_MSG_ID}" \
            -d "text=📤 Preparing results..." || true

      - name: Check Hardcoded Status
        if: always()
        id: check_hardcode
        run: |
          is_hardcoded=false
          
          if [ -f result.json ]; then
              python3 << 'EOF'
          import json
          import os
          
          is_hardcoded = False
          
          try:
              # Load result.json
              with open('result.json', 'r') as f:
                  result = json.load(f)
              
              # Extract model from metadata - use product_name for database lookup
              meta = result.get('ota_metadata', {})
              model = meta.get('product_name', '')
              if not model:
                  # Fallback to pre-device if product_name not available
                  model = meta.get('pre-device', '')
              
              if model:
                  # Fetch database.json from GitHub Pages
                  import urllib.request
                  try:
                      # Create request with User-Agent to avoid 403
                      req = urllib.request.Request(
                          'https://oparb.pages.dev/database.json',
                          headers={'User-Agent': 'Mozilla/5.0 (compatible; OnePlus-ARB-Checker/1.0)'}
                      )
                      with urllib.request.urlopen(req, timeout=10) as response:
                          database = json.loads(response.read().decode())
                      
                      # Check if model exists and is hardcoded
                      if model in database:
                          versions = database[model].get('versions', {})
                          # Check current versions for is_hardcoded flag
                          is_hardcoded = any(v.get('is_hardcoded', False) for v in versions.values())
                  except Exception as e:
                      print(f"Error checking hardcoded status: {e}")
          except json.JSONDecodeError:
              print("result.json is empty or invalid, skipping hardcoded check")
          except Exception as e:
              print(f"Unexpected error: {e}")
          
          # Write output to GitHub Actions output file
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f"is_hardcoded={str(is_hardcoded).lower()}\n")
          
          EOF
          fi

      - name: Send Telegram Reply
        if: always()
        run: |
          ERROR_MSG=""
          
          if [ "${{ steps.download.outcome }}" == "failure" ]; then
             ERROR_MSG="❌ Download Failed. Please check the URL or try again later."
          elif [ "${{ steps.analyze.outcome }}" == "failure" ]; then
             ERROR_MSG="❌ Analysis Failed. The file might not be a valid OnePlus firmware zip, or XBL/Payload could not be extracted."
          elif [ ! -f result.json ]; then
             ERROR_MSG="❌ Analysis Failed. No result file generated."
          fi

          if [ -z "$ERROR_MSG" ]; then
              if [ -f result.json ]; then
                 python3 parse_result.py
                 
                 if [ -f fw_env ]; then
                     source fw_env
                 else
                     # Fallback defaults if fw_env missing but no explicit error
                     DETECTED_DEVICE="Unknown"
                     DETECTED_PRODUCT="Unknown"
                     DETECTED_VERSION="Unknown"
                     DETECTED_PATCH="Unknown"
                     DETECTED_BUILD="Unknown"
                     DETECTED_ARB="Error"
                 fi
                 
                 # Override ARB display if device is hardcoded
                 if [ "${{ steps.check_hardcode.outputs.is_hardcoded }}" = "true" ]; then
                     DETECTED_ARB="?"
                 fi
              fi
              
               IMG_FLAG=""
               [ "${IMAGE_CHECK:-false}" = "true" ] && IMG_FLAG="--is-img-check"
               
               python3 send_telegram.py \
                 --token "$TELEGRAM_BOT_TOKEN" \
                 --chat-id "${{ github.event.inputs.request_chat_id }}" \
                 --device "$DETECTED_DEVICE" \
                 --product "$DETECTED_PRODUCT" \
                 --version "$DETECTED_VERSION" \
                 --security-patch "$DETECTED_PATCH" \
                 --build-id "$DETECTED_BUILD" \
                 --arb "$DETECTED_ARB" \
                 --url "${{ github.event.inputs.firmware_url }}" \
                 --user-mention "${{ github.event.inputs.request_user_name }}" \
                 --delete-message-id "${{ github.event.inputs.request_status_message_id }}" \
                 --delete-user-message-id "${{ github.event.inputs.request_message_id }}" \
                 $IMG_FLAG
          else
              # Send error notification
              python3 send_telegram.py \
                --token "$TELEGRAM_BOT_TOKEN" \
                --chat-id "${{ github.event.inputs.request_chat_id }}" \
                --device "Error" \
                --version "Error" \
                --arb "Error" \
                --error "$ERROR_MSG" \
                --user-mention "${{ github.event.inputs.request_user_name }}" \
                --delete-message-id "${{ github.event.inputs.request_status_message_id }}" \
                --delete-user-message-id "${{ github.event.inputs.request_message_id }}"
          fi
