name: Run Tests

on:
  push:
    branches: [ main ]
    paths:
      - '*.py'
      - 'bot/*.py'
      - 'requirements.txt'
      - 'tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - '*.py'
      - 'bot/*.py'
      - 'requirements.txt'
      - 'tests/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
